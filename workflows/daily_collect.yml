name: 📊 Daily Market Data Collection

on:
  schedule:
    - cron: '0 23 * * *'  # 매일 오전 8시 KST (UTC 기준 전날 23:00)
  workflow_dispatch:       # 수동 실행도 가능

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # CSV 커밋을 위한 쓰기 권한

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright & Chromium
        run: playwright install chromium --with-deps

      - name: Run data collection script
        run: python scripts/collect.py

      - name: Commit and push updated CSV
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/indicators.csv
          git diff --staged --quiet || git commit -m "📊 데이터 업데이트: $(TZ='Asia/Seoul' date +'%Y-%m-%d')"
          git push
