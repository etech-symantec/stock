<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STOCK WATCH — 내 포트폴리오 (실데이터 버전)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* ── CSS는 이전과 동일하며, 로딩 관련 스타일이 약간 추가되었습니다 ── */
  :root { --bg: #0d0f14; --bg2: #141720; --bg3: #1c2030; --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.14); --text: #e8eaf0; --text2: #8890a4; --text3: #555e72; --green: #00c87a; --green-bg: rgba(0,200,122,0.1); --red: #ff4d6a; --red-bg: rgba(255,77,106,0.1); --blue: #4d9fff; --accent: #7c6af7; --accent-bg: rgba(124,106,247,0.12); --radius: 10px; --radius-lg: 14px; --font-mono: 'Space Mono', monospace; --font-sans: 'Noto Sans KR', sans-serif; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-sans); min-height: 100vh; line-height: 1.6; }
  nav { display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 64px; border-bottom: 1px solid var(--border); background: rgba(13,15,20,0.95); position: sticky; top: 0; z-index: 50; backdrop-filter: blur(8px); flex-wrap: wrap; gap: 12px; }
  .logo { font-family: var(--font-mono); font-size: 16px; font-weight: 700; letter-spacing: 0.1em; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .logo-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .nav-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .range-group { display: flex; gap: 2px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 3px; }
  .rtab { padding: 4px 10px; font-size: 11px; font-family: var(--font-mono); background: transparent; border: none; color: var(--text2); cursor: pointer; border-radius: 7px; transition: all 0.15s; letter-spacing: 0.05em; }
  .rtab.active { background: var(--accent); color: #fff; }
  .rtab:hover:not(.active) { color: var(--text); background: var(--bg3); }
  select.sort-select { background: var(--bg2); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius); padding: 6px 10px; font-size: 12px; font-family: var(--font-sans); outline: none; cursor: pointer; }
  main { max-width: 1400px; margin: 0 auto; padding: 1.5rem 1.5rem 4rem; }
  .add-bar { display: flex; gap: 10px; margin-bottom: 1.5rem; align-items: center; flex-wrap: wrap; }
  .add-bar input { flex: 1; min-width: 160px; max-width: 320px; padding: 9px 16px; background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius); color: var(--text); font-family: var(--font-mono); font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; outline: none; transition: border-color 0.15s; }
  .add-bar input:focus { border-color: var(--accent); }
  .btn { padding: 9px 18px; border-radius: var(--radius); border: 1px solid var(--border2); background: transparent; color: var(--text2); font-family: var(--font-sans); font-size: 13px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .btn:hover:not(:disabled) { background: var(--bg3); color: var(--text); border-color: var(--border2); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); font-weight: 500; }
  .btn-primary:hover:not(:disabled) { background: var(--accent); color: #fff; }
  .btn-danger { color: var(--red); border-color: transparent; background: transparent; padding: 4px 8px; font-size: 12px; }
  .btn-danger:hover { background: var(--red-bg); border-color: var(--red); }
  .btn-icon { padding: 6px 10px; font-size: 12px; }
  .dashboard-top { display: flex; gap: 20px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .summary { flex: 2; display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; }
  .allocation { flex: 1; min-width: 250px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; display: flex; align-items: center; justify-content: center; height: 160px; }
  .sum-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; display: flex; flex-direction: column; justify-content: center; }
  .sum-label { font-size: 11px; color: var(--text3); letter-spacing: 0.06em; margin-bottom: 6px; text-transform: uppercase; }
  .sum-value { font-family: var(--font-mono); font-size: 20px; font-weight: 700; }
  .sum-value.up { color: var(--green); } .sum-value.down { color: var(--red); }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 18px 12px; cursor: pointer; transition: border-color 0.2s, transform 0.15s; position: relative; overflow: hidden; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--line-color, var(--border)); border-radius: var(--radius-lg) var(--radius-lg) 0 0; }
  .card.up::before { background: var(--green); } .card.down::before { background: var(--red); }
  .card:hover { border-color: var(--border2); transform: translateY(-1px); }
  .card-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .card-ticker { font-family: var(--font-mono); font-size: 15px; font-weight: 700; letter-spacing: 0.06em; }
  .card-badge { font-size: 10px; padding: 3px 8px; border-radius: 20px; letter-spacing: 0.04em; }
  .badge-up { background: var(--green-bg); color: var(--green); } .badge-down { background: var(--red-bg); color: var(--red); } .badge-flat { background: var(--bg3); color: var(--text2); }
  .card-price { font-family: var(--font-mono); font-size: 24px; font-weight: 700; margin-bottom: 2px; }
  .card-meta { font-size: 11px; color: var(--text3); margin-bottom: 10px; display: flex; gap: 12px; flex-wrap: wrap; }
  .chart-wrap { height: 80px; position: relative; display: flex; align-items: center; justify-content: center; }
  .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .holding-info { font-size: 11px; color: var(--text2); } .holding-info span { color: var(--text); font-weight: 500; }
  .empty { grid-column: 1 / -1; text-align: center; padding: 4rem 2rem; color: var(--text3); border: 1px dashed var(--border2); border-radius: var(--radius-lg); }
  .empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.5; } .empty p { font-size: 14px; line-height: 1.8; }
  .overlay, .holding-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; padding: 1rem; backdrop-filter: blur(4px); }
  .overlay.open, .holding-overlay.open { display: flex; }
  .modal, .holding-modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius-lg); width: 100%; animation: fadeUp 0.2s ease; }
  .modal { max-width: 600px; max-height: 90vh; overflow-y: auto; } .holding-modal { max-width: 400px; padding: 24px; z-index: 200; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  .modal-header { padding: 20px 24px 0; display: flex; justify-content: space-between; align-items: flex-start; }
  .modal-body { padding: 16px 24px 24px; }
  .modal-chart-wrap { height: 220px; position: relative; margin: 14px 0; }
  .modal-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 16px; }
  .mstat { background: var(--bg3); border-radius: var(--radius); padding: 12px 14px; }
  .mstat-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; }
  .mstat-val { font-family: var(--font-mono); font-size: 14px; font-weight: 700; }
  .form-group { margin-bottom: 14px; } .form-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; display: block; }
  .form-input { width: 100%; padding: 9px 14px; background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius); color: var(--text); font-family: var(--font-mono); font-size: 13px; outline: none; transition: border-color 0.15s; }
  .form-input:focus { border-color: var(--accent); }
  .api-panel { margin-bottom: 1.5rem; background: var(--bg2); border: 1px solid var(--border); border-left: 3px solid var(--green); border-radius: var(--radius); padding: 14px 18px; font-size: 13px; color: var(--text2); line-height: 1.8; }
  .section-title { font-size: 12px; font-family: var(--font-mono); color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .loading-text { font-family: var(--font-mono); font-size: 12px; color: var(--text2); animation: blink 1.5s infinite; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
</style>
</head>
<body>

<input type="file" id="importFile" accept=".json" style="display: none;" onchange="importData(event)">

<nav>
  <div class="logo"><div class="logo-dot"></div>STOCK&nbsp;WATCH</div>
  <div class="nav-right">
    <select class="sort-select" id="sortSelect" onchange="setSortMode(this.value)">
      <option value="default">정렬: 기본순</option>
      <option value="roiDesc">수익률 높은순</option>
      <option value="evalDesc">평가금액 큰순</option>
    </select>
    <div class="range-group">
      <button class="rtab" onclick="setRange('1mo',this)">1M</button>
      <button class="rtab" onclick="setRange('3mo',this)">3M</button>
      <button class="rtab" onclick="setRange('6mo',this)">6M</button>
      <button class="rtab active" onclick="setRange('1y',this)">1Y</button>
    </div>
    <button class="btn btn-icon" onclick="exportData()" title="데이터 백업">⬇️ 저장</button>
    <button class="btn btn-icon" onclick="document.getElementById('importFile').click()" title="데이터 복원">⬆️ 불러오기</button>
    <button class="btn" onclick="openHoldingModal(null)">+ 잔고 입력</button>
  </div>
</nav>

<main>
  <div class="api-panel">
    📡 <strong>실제 시장 데이터 연동 모드 활성화됨.</strong> 야후 파이낸스(Yahoo Finance) 데이터를 기반으로 실존하는 주식만 차트에 반영됩니다. (한국 주식은 종목코드 6자리를 입력하면 자동으로 코스피/코스닥을 검색합니다.)
  </div>

  <div class="add-bar">
    <input type="text" id="tickerInput" placeholder="종목코드 입력  예) AAPL, 005930" maxlength="12" />
    <button class="btn btn-primary" id="addBtn" onclick="addTicker()">+ 종목 추가 및 검증</button>
  </div>

  <div class="dashboard-top" id="dashboardTop" style="display:none">
    <div class="summary" id="summary">
      <div class="sum-card"><div class="sum-label">총 평가금액</div><div class="sum-value" id="totalVal">—</div></div>
      <div class="sum-card"><div class="sum-label">총 평가손익</div><div class="sum-value" id="totalPnl">—</div></div>
      <div class="sum-card"><div class="sum-label">수익률</div><div class="sum-value" id="totalRoi">—</div></div>
      <div class="sum-card"><div class="sum-label">등록 종목 수</div><div class="sum-value" style="color:var(--accent)" id="totalCount">—</div></div>
    </div>
    <div class="allocation" title="포트폴리오 비중"><canvas id="allocationCanvas"></canvas></div>
  </div>

  <div class="section-title" id="gridTitle" style="display:none">보유 종목 차트</div>
  <div class="grid" id="grid"></div>
</main>

<div class="overlay" id="chartOverlay" onclick="closeChartModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div>
        <div id="mTicker" style="font-family:var(--font-mono);font-size:18px;font-weight:700;"></div>
        <div id="mBroker" style="font-size:12px;color:var(--text3);margin-top:2px"></div>
      </div>
      <button class="btn" onclick="closeChartModal()" style="padding:6px 14px;font-size:12px">닫기</button>
    </div>
    <div class="modal-body">
      <div style="display:flex;align-items:baseline;gap:12px;margin-bottom:4px">
        <div id="mPrice" style="font-family:var(--font-mono);font-size:28px;font-weight:700"></div>
        <div id="mChange" style="font-size:14px;font-weight:500;padding:3px 10px;border-radius:20px"></div>
      </div>
      <div id="mMeta" style="font-size:12px;color:var(--text3)"></div>
      <div class="modal-chart-wrap"><canvas id="modalCanvas"></canvas></div>
      <div class="modal-stats" id="mStats"></div>
    </div>
  </div>
</div>

<div class="holding-overlay" id="holdingOverlay" onclick="closeHoldingModal(event)">
  <div class="holding-modal" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <div style="font-size:16px;font-weight:700" id="holdingTitle">보유 종목 입력</div>
      <button class="btn" onclick="closeHoldingModal()" style="padding:5px 12px;font-size:12px">취소</button>
    </div>
    <div class="form-group">
      <label class="form-label">종목코드 *</label>
      <input class="form-input" id="hTicker" type="text" placeholder="AAPL, 005930 ..." disabled>
    </div>
    <div class="form-group">
      <label class="form-label">보유 수량</label>
      <input class="form-input" id="hQty" type="number" placeholder="0" min="0">
    </div>
    <div class="form-group">
      <label class="form-label">평균 매입가</label>
      <input class="form-input" id="hAvg" type="number" placeholder="0" min="0" step="0.01">
    </div>
    <button class="btn btn-primary" onclick="saveHolding()" style="width:100%;padding:11px;font-size:14px;margin-top:4px">저장</button>
  </div>
</div>

<script>
const STORE_KEY = 'stockwatch_real_v1';
let state = loadState();
let currentSortMode = 'default';
let allocationChartInst = null;
const chartInstances = {};
let modalChartInst = null;
let cachedMarketData = {}; // API 호출 최소화를 위한 메모리 캐시

function loadState() {
  try {
    const s = localStorage.getItem(STORE_KEY);
    if (s) return JSON.parse(s);
  } catch(e){}
  // 기본 데모 종목 (진짜 존재하는 것만)
  return { tickers: ['AAPL','TSLA','005930.KS'], holdings: {}, range: '1y' };
}
function saveState() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch(e){}
}

// ── REAL DATA FETCHING (Yahoo Finance via CORS Proxy) ──
async function fetchYahooData(symbol, range) {
  // corsproxy.io 를 통해 우회 (정적 호스팅 환경 해결책)
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?range=${range}&interval=1d`;
  const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(url)}`;
  
  try {
    const res = await fetch(proxyUrl);
    if (!res.ok) return null;
    const json = await res.json();
    if (!json.chart || !json.chart.result || json.chart.result.length === 0) return null;
    
    const result = json.chart.result[0];
    const timestamps = result.timestamp;
    const quotes = result.indicators.quote[0];
    const prices = quotes.close;
    
    let validPrices = [], validDates = [];
    for(let i=0; i<timestamps.length; i++) {
      if(prices[i] !== null) {
        validPrices.push(prices[i]);
        const d = new Date(timestamps[i] * 1000);
        validDates.push(`${d.getMonth()+1}/${d.getDate()}`);
      }
    }
    if(validPrices.length === 0) return null;
    
    return {
      symbol: symbol,
      currency: result.meta.currency || 'USD',
      prices: validPrices,
      dates: validDates,
      last: validPrices[validPrices.length-1],
      prev: validPrices[validPrices.length-2] || validPrices[validPrices.length-1]
    };
  } catch(e) {
    console.error("Fetch Error:", e);
    return null;
  }
}

// 종목 검색 및 자동 변환 (한국 주식 지원)
async function validateAndFetch(ticker, range) {
  let symbol = ticker.toUpperCase();
  
  // 한국 주식 6자리 숫자일 경우 .KS(코스피) 먼저 검색 후 없으면 .KQ(코스닥) 검색
  if (/^\d{6}$/.test(symbol)) {
    let data = await fetchYahooData(symbol + '.KS', range);
    if (data) return data;
    data = await fetchYahooData(symbol + '.KQ', range);
    if (data) return data;
    return null; // 둘 다 없으면 가짜 주식
  }
  
  return await fetchYahooData(symbol, range);
}

// ── RENDER LOGIC ──
async function render() {
  const grid = document.getElementById('grid');
  const dashboardTop = document.getElementById('dashboardTop');
  const gridTitle = document.getElementById('gridTitle');

  if (!state.tickers.length) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">📈</div><p>존재하는 종목코드를 입력하세요<br><span style="font-size:12px;color:var(--text3)">예) AAPL, TSLA, 005930</span></p></div>`;
    dashboardTop.style.display = 'none'; gridTitle.style.display = 'none';
    return;
  }

  dashboardTop.style.display = 'flex';
  gridTitle.style.display = 'flex';
  
  // 1단계: 스켈레톤/로딩 UI 표시 (화면 깜빡임 방지)
  if(Object.keys(cachedMarketData).length === 0) {
    grid.innerHTML = state.tickers.map(t => `<div class="card" style="display:flex;align-items:center;justify-content:center;height:200px"><div class="loading-text">${t} 데이터 로딩중...</div></div>`).join('');
  }

  // 2단계: 실제 데이터 일괄 Fetch
  const promises = state.tickers.map(t => validateAndFetch(t, state.range));
  const results = await Promise.all(promises);
  
  let validTickers = [];
  results.forEach((data, i) => {
    const originalTicker = state.tickers[i];
    if(data) {
      cachedMarketData[originalTicker] = data; // 성공한 데이터 캐싱
      validTickers.push(originalTicker);
    } else {
      // 야후에서 삭제되었거나 오류인 종목 묵시적 제외 처리
      console.warn(`Data not found for ${originalTicker}`);
    }
  });

  // 정렬 준비
  let displayTickers = [...validTickers];
  const tickerStats = {};
  
  displayTickers.forEach(t => {
    const data = cachedMarketData[t];
    const h = state.holdings[t] || {};
    // 환율 환산은 복잡하므로 여기서는 단순 수량*현재가 로 계산 (화폐단위 무시)
    const evalAmt = (h.qty || 0) * data.last;
    const costAmt = (h.qty || 0) * (h.avg || 0);
    const roi = costAmt > 0 ? ((evalAmt - costAmt) / costAmt * 100) : -9999; 
    tickerStats[t] = { evalAmt, roi };
  });

  if(currentSortMode === 'roiDesc') displayTickers.sort((a,b) => tickerStats[b].roi - tickerStats[a].roi);
  else if(currentSortMode === 'evalDesc') displayTickers.sort((a,b) => tickerStats[b].evalAmt - tickerStats[a].evalAmt);

  // 3단계: 실제 DOM 렌더링
  Object.values(chartInstances).forEach(c => c.destroy());
  
  grid.innerHTML = displayTickers.map(ticker => {
    const data = cachedMarketData[ticker];
    const h = state.holdings[ticker] || {};
    const chgPct = ((data.last-data.prev)/data.prev*100).toFixed(2);
    const chgAbs = (data.last-data.prev);
    const cls = chgPct > 0 ? 'up' : (chgPct < 0 ? 'down' : 'flat');
    const sign = chgPct > 0 ? '+' : '';
    
    const qty = h.qty || 0, avg = h.avg || 0;
    const pnl = qty > 0 ? (data.last - avg) * qty : null;
    const pnlPct = qty > 0 && avg > 0 ? ((data.last-avg)/avg*100).toFixed(2) : null;
    
    const isKrw = data.currency === 'KRW';
    const fmt = (n) => isKrw ? '₩'+Math.round(n).toLocaleString() : '$'+n.toFixed(2);

    return `
      <div class="card ${cls}" onclick="openChartModal('${ticker}')">
        <div class="card-head">
          <div class="card-ticker">${data.symbol}</div>
          <div style="display:flex;align-items:center;gap:6px">
            <span class="card-badge badge-${cls}">${sign}${chgPct}%</span>
            <button class="btn btn-danger" onclick="event.stopPropagation();editHolding('${ticker}')" title="잔고 수정" style="padding:4px 8px;font-size:11px">잔고</button>
            <button class="btn btn-danger" onclick="event.stopPropagation();removeTicker('${ticker}')" title="삭제">✕</button>
          </div>
        </div>
        <div class="card-price">${fmt(data.last)}</div>
        <div class="chart-wrap"><canvas id="c_${ticker}"></canvas></div>
        ${qty > 0 ? `
        <div class="card-footer">
          <div class="holding-info"><span>${qty.toLocaleString()}주</span> · 매입 ${fmt(avg)}</div>
          <div style="font-size:12px;font-family:var(--font-mono);color:${pnl>=0?'var(--green)':'var(--red)'}">${pnl>=0?'+':''}${fmt(Math.abs(pnl))} <span style="font-size:10px">(${pnl>=0?'+':''}${pnlPct}%)</span></div>
        </div>` : ''}
      </div>
    `;
  }).join('');

  displayTickers.forEach(ticker => {
    const data = cachedMarketData[ticker];
    chartInstances[ticker] = buildChart(`c_${ticker}`, data.prices, data.dates, data.currency, true);
  });

  updateSummaryAndAllocation(validTickers);
}

// ── UTILS & CHART.JS ──
function getColors(prices) {
  const last = prices[prices.length-1], first = prices[0];
  if (last > first) return { line:'#00c87a', fill:'rgba(0,200,122,0.12)' };
  if (last < first) return { line:'#ff4d6a', fill:'rgba(255,77,106,0.12)' };
  return { line:'#8890a4', fill:'rgba(136,144,164,0.1)' };
}

function buildChart(canvasId, prices, dates, currency, mini) {
  const {line, fill} = getColors(prices);
  const canvas = document.getElementById(canvasId);
  if (!canvas) return null;
  return new Chart(canvas, {
    type: 'line',
    data: { labels: dates, datasets: [{ data: prices, borderColor: line, backgroundColor: fill, borderWidth: mini ? 1.5 : 2, pointRadius: 0, tension: 0.1, fill: true }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { mode: 'index', intersect: false, displayColors: false } },
      scales: {
        x: { display: !mini, ticks: { font:{size:10}, color:'#555e72' }, grid: { display: false }, border: { display: false } },
        y: { display: !mini, ticks: { font:{size:10}, color:'#555e72' }, grid: { color:'rgba(255,255,255,0.04)' }, border: { display: false } }
      },
      interaction: { mode: 'index', intersect: false }, animation: { duration: 0 }
    }
  });
}

function updateSummaryAndAllocation(validTickers) {
  let totalEval = 0, totalCost = 0, count = validTickers.length;
  const allocData = [], allocLabels = [], allocColors = ['#7c6af7', '#4d9fff', '#00c87a', '#ff4d6a', '#f5a623'];

  validTickers.forEach(t => {
    const data = cachedMarketData[t];
    const h = state.holdings[t] || {};
    if (h.qty && h.avg) {
      // 화폐 단위가 달라도 단순 수치 합산 (환율 연동은 제외)
      const eAmt = h.qty * data.last;
      totalEval += eAmt;
      totalCost += h.qty * h.avg;
      if(eAmt > 0) { allocData.push(eAmt); allocLabels.push(data.symbol); }
    }
  });
  
  const pnl = totalEval - totalCost;
  const roi = totalCost > 0 ? (pnl/totalCost*100) : 0;

  document.getElementById('totalVal').textContent = totalEval > 0 ? Math.round(totalEval).toLocaleString() : '—';
  const pnlEl = document.getElementById('totalPnl');
  pnlEl.textContent = totalCost > 0 ? (pnl >= 0 ? '+' : '') + Math.round(pnl).toLocaleString() : '—';
  pnlEl.className = 'sum-value ' + (pnl >= 0 ? 'up' : 'down');
  const roiEl = document.getElementById('totalRoi');
  roiEl.textContent = totalCost > 0 ? (roi >= 0 ? '+' : '') + roi.toFixed(2) + '%' : '—';
  roiEl.className = 'sum-value ' + (roi >= 0 ? 'up' : 'down');
  document.getElementById('totalCount').textContent = count + '개';

  if(allocationChartInst) allocationChartInst.destroy();
  const ctx = document.getElementById('allocationCanvas');
  if(allocData.length > 0 && ctx) {
    allocationChartInst = new Chart(ctx, { type: 'doughnut', data: { labels: allocLabels, datasets: [{ data: allocData, backgroundColor: allocColors, borderWidth: 0 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: '#8890a4', font:{size:10}, boxWidth: 10 } } }, cutout: '70%' } });
  } else if (ctx) {
    allocationChartInst = new Chart(ctx, { type: 'doughnut', data: { labels: ['잔고 미입력'], datasets: [{ data: [1], backgroundColor: ['#1c2030'], borderWidth: 0 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { enabled: false } }, cutout: '70%' } });
  }
}

// ── ACTIONS ──
async function addTicker() {
  const inp = document.getElementById('tickerInput');
  const btn = document.getElementById('addBtn');
  const val = inp.value.trim().toUpperCase();
  if (!val) return;
  
  if (state.tickers.includes(val) || state.tickers.includes(val+'.KS') || state.tickers.includes(val+'.KQ')) {
    alert("이미 등록된 종목입니다.");
    inp.value = ''; return;
  }

  inp.disabled = true;
  btn.disabled = true;
  btn.textContent = "검증 중...";

  // 존재하는 주식인지 API 찔러보기
  const validData = await validateAndFetch(val, '1mo');
  
  inp.disabled = false;
  btn.disabled = false;
  btn.textContent = "+ 종목 추가 및 검증";

  if (validData) {
    // 실제 반환된 심볼(예: 한국주식 005930 -> 005930.KS)로 저장
    state.tickers.push(validData.symbol);
    cachedMarketData = {}; // 새로고침을 위해 캐시 초기화
    saveState();
    inp.value = '';
    render();
  } else {
    inp.style.borderColor = 'var(--red)';
    inp.value = '';
    inp.placeholder = '존재하지 않는 종목입니다!';
    setTimeout(() => { inp.style.borderColor = ''; inp.placeholder = '종목코드 입력  예) AAPL, 005930'; }, 2000);
  }
}

function removeTicker(t) {
  state.tickers = state.tickers.filter(x => x !== t);
  delete state.holdings[t];
  delete cachedMarketData[t];
  saveState(); render();
}

function setRange(rangeStr, el) {
  state.range = rangeStr; saveState();
  document.querySelectorAll('.rtab').forEach(b => b.classList.remove('active'));
  el.classList.add('active'); 
  cachedMarketData = {}; // 기간이 바뀌면 캐시 초기화 후 재로딩
  render();
}

function setSortMode(mode) { currentSortMode = mode; render(); }

// ── MODALS (잔고/상세 차트) ──
function openHoldingModal(ticker) {
  document.getElementById('hTicker').value = ticker || '';
  const h = state.holdings[ticker] || {};
  document.getElementById('hQty').value = h.qty || '';
  document.getElementById('hAvg').value = h.avg || '';
  document.getElementById('holdingOverlay').classList.add('open');
}
function editHolding(ticker) { openHoldingModal(ticker); }
function closeHoldingModal() { document.getElementById('holdingOverlay').classList.remove('open'); }

function saveHolding() {
  const ticker = document.getElementById('hTicker').value;
  const qty = parseFloat(document.getElementById('hQty').value) || 0;
  const avg = parseFloat(document.getElementById('hAvg').value) || 0;
  if (!ticker) return;
  state.holdings[ticker] = { qty, avg };
  saveState(); closeHoldingModal(); render();
}

function openChartModal(ticker) {
  const data = cachedMarketData[ticker];
  if(!data) return;
  const hi = Math.max(...data.prices), lo = Math.min(...data.prices);
  const fmt = (n) => data.currency==='KRW' ? '₩'+Math.round(n).toLocaleString() : '$'+n.toFixed(2);
  
  document.getElementById('mTicker').textContent = data.symbol;
  document.getElementById('mPrice').textContent = fmt(data.last);
  const chgPct = ((data.last-data.prev)/data.prev*100).toFixed(2);
  document.getElementById('mChange').textContent = `${chgPct > 0 ? '+':''}${fmt(data.last-data.prev)} (${chgPct > 0 ? '+':''}${chgPct}%)`;
  document.getElementById('mMeta').textContent = `고가 ${fmt(hi)} · 저가 ${fmt(lo)}`;
  
  document.getElementById('chartOverlay').classList.add('open');
  if (modalChartInst) modalChartInst.destroy();
  setTimeout(() => { modalChartInst = buildChart('modalCanvas', data.prices, data.dates, data.currency, false); }, 50);
}
function closeChartModal() { document.getElementById('chartOverlay').classList.remove('open'); }

document.getElementById('tickerInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTicker(); });

// 초기 렌더링
render();
</script>
