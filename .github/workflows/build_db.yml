name: 🗄️ Build Stock Database

on:
  workflow_dispatch: # 수동 실행 유지
  schedule:
    - cron: '0 15 * * *' # 한국 시간 기준 매일 오전 00:00 (UTC 15:00)

jobs:
  build-db:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 생성된 JSON 파일을 저장소에 커밋하기 위한 권한

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 라이브러리 설치
        run: |
          pip install -r requirements.txt
          pip install finance-datareader  # 명시적 설치

      - name: Build Stock DB (종목 DB 갱신)
        env:
          # GitHub Secrets에 등록한 API 키를 파이썬 스크립트로 전달합니다.
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY }}
        run: python scripts/build_stock_db.py

      - name: 완성된 JSON 파일 커밋 및 푸시
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/stocks.json
          # 변경사항이 있을 경우에만 진행
          if ! git diff --staged --quiet; then
            git commit -m "🗂️ 종목 DB 자동 생성 및 업데이트"
            
            # 푸시 전에 원격 저장소의 내용을 가져와서 병합 (충돌 시 자동 머지 시도)
            git pull --rebase origin main
            
            # 최종 푸시
            git push origin main
          fi
